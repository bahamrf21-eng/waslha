<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Waslha</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <!-- Theme & Language toggles (no navbar on login) -->
    <div style="display: flex; justify-content: flex-end; gap: 0.5rem; padding: 1rem 1.5rem;">
        <button class="toggle-btn theme-toggle" onclick="platformUI.toggleTheme()">🌙 Dark</button>
        <button class="toggle-btn lang-toggle" onclick="platformUI.toggleLang()">AR عربي</button>
    </div>

    <div class="form-container">
        <h1 class="form-title" data-i18n="login.title">Welcome Back</h1>
        <p class="form-subtitle" data-i18n="login.subtitle">Sign in to your account</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label" data-i18n="login.email">Email <span style="color: var(--danger-color);">*</span></label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="your.email@example.com"
                    data-i18n-placeholder="ph.email"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label" data-i18n="login.password">Password <span style="color: var(--danger-color);">*</span></label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="Enter your password"
                    data-i18n-placeholder="ph.password"
                    required
                    minlength="6"
                >
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" data-i18n="login.submit">Login</button>
        </form>
        
        <div class="text-center mt-3">
            <p style="color: var(--text-secondary);">
                <span data-i18n="login.noAccount">Don't have an account?</span> 
                <a href="register.html" class="btn-link" data-i18n="login.registerLink">Register here</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase/supabaseClient.js"></script>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/i18n.js"></script>
    <script>document.addEventListener('DOMContentLoaded', function() { platformUI.init(); });</script>
</body>
</html>
