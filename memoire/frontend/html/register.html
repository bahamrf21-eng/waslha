<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Waslha</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <!-- Theme & Language toggles (no navbar on register) -->
    <div style="display: flex; justify-content: flex-end; gap: 0.5rem; padding: 1rem 1.5rem;">
        <button class="toggle-btn theme-toggle" onclick="platformUI.toggleTheme()">🌙 Dark</button>
        <button class="toggle-btn lang-toggle" onclick="platformUI.toggleLang()">AR عربي</button>
    </div>

    <div class="form-container">
        <h1 class="form-title" data-i18n="register.title">Merchant Registration</h1>
        <p class="form-subtitle" data-i18n="register.subtitle">Create your merchant account to get started</p>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="fullName" class="form-label" data-i18n="register.fullName">Full Name <span style="color: var(--danger-color);">*</span></label>
                <input 
                    type="text" 
                    id="fullName" 
                    name="fullName" 
                    class="form-input" 
                    placeholder="John Doe"
                    data-i18n-placeholder="ph.fullName"
                    required
                    minlength="2"
                >
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label" data-i18n="register.email">Email <span style="color: var(--danger-color);">*</span></label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="your.email@example.com"
                    data-i18n-placeholder="ph.email"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label" data-i18n="register.password">Password <span style="color: var(--danger-color);">*</span></label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="Create a password (min. 6 characters)"
                    data-i18n-placeholder="ph.createPassword"
                    required
                    minlength="6"
                >
            </div>
            
            <!-- Merchant business info (phone + preferred delivery company) -->
            <div class="form-group">
                <label for="phone" class="form-label" data-i18n="register.phone">Phone Number <span style="color: var(--danger-color);">*</span></label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    class="form-input" 
                    placeholder="0555 123 456"
                    data-i18n-placeholder="ph.phone"
                    required
                >
            </div>

            <div class="form-group">
                <label for="preferredDelivery" class="form-label" data-i18n="register.delivery">Preferred Delivery Company <span style="color: var(--danger-color);">*</span></label>
                <select id="preferredDelivery" name="preferredDelivery" class="form-select" required>
                    <option value="" data-i18n="register.selectDel">Select a delivery company</option>
                    <option value="Express Livraison">Express Livraison</option>
                    <option value="Rapid Delivery">Rapid Delivery</option>
                    <option value="Alger Post">Alger Post</option>
                    <option value="Nord Express">Nord Express</option>
                    <option value="Sahara Logistique">Sahara Logistique</option>
                </select>
            </div>

            <!-- Closed B2B model: role is fixed to merchant, no role selector needed -->
            
            <button type="submit" class="btn btn-primary btn-block" data-i18n="register.submit">Register</button>
        </form>
        
        <div class="text-center mt-3">
            <p style="color: var(--text-secondary);">
                <span data-i18n="register.hasAccount">Already have an account?</span> 
                <a href="login.html" class="btn-link" data-i18n="register.loginLink">Login here</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase/supabaseClient.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/i18n.js"></script>
    <script>document.addEventListener('DOMContentLoaded', function() { platformUI.init(); });</script>
</body>
</html>
