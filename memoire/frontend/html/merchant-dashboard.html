<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard - Waslha</title>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <!-- Navigation Bar (Merchant: Dashboard, Orders, Create Order, Profile, Logout) -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="#" class="navbar-brand" id="dashboardLink">Was<span>lha</span></a>
            <div class="navbar-links">
                <a href="#" class="navbar-link" id="ordersLink" data-i18n="nav.orders">Orders</a>
                <a href="#" class="navbar-link" id="createOrderLink" data-i18n="nav.createOrder">Create Order</a>
                <a href="profile.html" class="navbar-link" data-i18n="nav.profile">Profile</a>
                <button class="btn-link" onclick="auth.logout()" data-i18n="nav.logout">Logout</button>
                <div class="navbar-toggles">
                    <button class="toggle-btn theme-toggle" onclick="platformUI.toggleTheme()">🌙 Dark</button>
                    <button class="toggle-btn lang-toggle" onclick="platformUI.toggleLang()">AR عربي</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container">
        <div class="page-content">
            <div class="page-header">
                <div class="page-header-illustrated">
                    <div class="section-illustration">&#128202;</div>
                    <div>
                        <h1 class="page-title" data-i18n="merchant.title">Merchant Dashboard</h1>
                        <p class="page-subtitle" data-i18n="merchant.subtitle">Overview of your delivery orders</p>
                    </div>
                </div>
            </div>

            <!-- Summary Cards -->
            <div class="summary-grid">
                <div class="summary-card">
                    <div class="summary-card-title" data-i18n="merchant.totalOrders">Total Orders</div>
                    <div class="summary-card-value" id="totalOrders">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-card-title" data-i18n="merchant.pending">Pending</div>
                    <div class="summary-card-value" id="pendingOrders">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-card-title" data-i18n="merchant.delivered">Delivered</div>
                    <div class="summary-card-value" id="deliveredOrders">0</div>
                </div>
                <div class="summary-card" style="border-left-color: var(--danger-color);">
                    <div class="summary-card-title" data-i18n="merchant.refused">Refused</div>
                    <div class="summary-card-value" id="merchantRefusedOrders">0</div>
                </div>
                <div class="summary-card" style="border-left-color: var(--warning-color);">
                    <div class="summary-card-title" data-i18n="merchant.returned">Returned</div>
                    <div class="summary-card-value" id="merchantReturnedOrders">0</div>
                </div>
            </div>

            <!-- Action Button -->
            <div class="mb-4">
                <a href="create-order.html" class="btn btn-primary" data-i18n="merchant.createNew">Create New Order</a>
            </div>

            <!-- Recent Orders Preview -->
            <div class="card">
                <div class="card-header">
                    <div class="section-header-illustrated">
                        <div class="section-illustration section-illustration--secondary">&#128203;</div>
                        <h2 class="card-title" data-i18n="merchant.recent">Recent Orders</h2>
                    </div>
                </div>
                <div class="card-body">
                    <div id="recentOrders">
                        <p style="color: var(--text-secondary);">Loading orders...</p>
                    </div>
                </div>
            </div>

            <!-- Refused Orders Section -->
            <div class="card">
                <div class="card-header">
                    <div class="section-header-illustrated">
                        <div class="section-illustration section-illustration--danger">&#10060;</div>
                        <h2 class="card-title" data-i18n="merchant.refusedTitle">Refused Orders</h2>
                    </div>
                </div>
                <div class="card-body">
                    <div id="merchantRefusedOrdersList">
                        <p style="color: var(--text-secondary);">No refused orders</p>
                    </div>
                </div>
            </div>

            <!-- Returned Orders Section -->
            <div class="card">
                <div class="card-header">
                    <div class="section-header-illustrated">
                        <div class="section-illustration section-illustration--warning">&#128260;</div>
                        <h2 class="card-title" data-i18n="merchant.returnedTitle">Returned Orders</h2>
                    </div>
                </div>
                <div class="card-body">
                    <div id="merchantReturnedOrdersList">
                        <p style="color: var(--text-secondary);">No returned orders</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase/supabaseClient.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/orders.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/i18n.js"></script>
    <script>
        // Initialize dashboard when page loads
        document.addEventListener('DOMContentLoaded', async function () {
            // Check role-based access
            if (!auth.checkPageAccess('merchant')) {
                return;
            }

            // Initialize navigation
            auth.initNavigation();

            // Initialize theme & language
            platformUI.init();

            // Initialize dashboard
            await dashboard.init('merchant');
        });
    </script>
</body>

</html>
