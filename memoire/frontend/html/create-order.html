<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order - Waslha</title>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <!-- Navigation Bar (Merchant: Dashboard, Orders, Create Order, Profile, Logout) -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="#" class="navbar-brand" id="dashboardLink">Was<span>lha</span></a>
            <div class="navbar-links">
                <a href="#" class="navbar-link" id="ordersLink" data-i18n="nav.orders">Orders</a>
                <a href="#" class="navbar-link" id="createOrderLink" data-i18n="nav.createOrder">Create Order</a>
                <a href="profile.html" class="navbar-link" data-i18n="nav.profile">Profile</a>
                <button class="btn-link" onclick="auth.logout()" data-i18n="nav.logout">Logout</button>
                <div class="navbar-toggles">
                    <button class="toggle-btn theme-toggle" onclick="platformUI.toggleTheme()">🌙 Dark</button>
                    <button class="toggle-btn lang-toggle" onclick="platformUI.toggleLang()">AR عربي</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container">
        <div class="page-content">
            <div class="page-header">
                <div class="page-header-illustrated">
                    <div class="section-illustration">&#128230;</div>
                    <div>
                        <h1 class="page-title" data-i18n="create.title">Create New Order</h1>
                        <p class="page-subtitle" data-i18n="create.subtitle">Fill in the details to create a delivery
                            order</p>
                    </div>
                </div>
            </div>

            <!-- Split Layout: Form + Illustration -->
            <div class="create-order-layout">
                <!-- Left: Order Form -->
                <div class="create-order-form">
                    <div class="form-container" style="max-width: 600px; margin: 0;">
                        <form id="createOrderForm">
                            <div class="form-group">
                                <label for="firstName" class="form-label" data-i18n="create.firstName">Customer First
                                    Name <span style="color: var(--danger-color);">*</span></label>
                                <input type="text" id="firstName" name="firstName" class="form-input"
                                    placeholder="e.g., Ahmed" data-i18n-placeholder="ph.firstName" required
                                    minlength="2">
                                <span class="form-error" id="firstNameError"></span>
                            </div>

                            <div class="form-group">
                                <label for="lastName" class="form-label" data-i18n="create.lastName">Customer Last Name
                                    <span style="color: var(--danger-color);">*</span></label>
                                <input type="text" id="lastName" name="lastName" class="form-input"
                                    placeholder="e.g., Benali" data-i18n-placeholder="ph.lastName" required
                                    minlength="2">
                                <span class="form-error" id="lastNameError"></span>
                            </div>

                            <div class="form-group">
                                <label for="customerAddress" class="form-label"
                                    data-i18n="create.customerAddress">Customer Address <span
                                        style="color: var(--danger-color);">*</span></label>
                                <input type="text" id="customerAddress" name="customerAddress" class="form-input"
                                    placeholder="e.g., 12 Rue Didouche Mourad, Algiers"
                                    data-i18n-placeholder="ph.customerAddress" required minlength="5">
                                <span class="form-error" id="customerAddressError"></span>
                            </div>

                            <div class="form-group">
                                <label for="productName" class="form-label" data-i18n="create.product">Product Name
                                    <span style="color: var(--danger-color);">*</span></label>
                                <input type="text" id="productName" name="productName" class="form-input"
                                    placeholder="e.g., Electronics Package" data-i18n-placeholder="ph.product" required
                                    minlength="2">
                                <span class="form-error" id="productNameError"></span>
                            </div>

                            <div class="form-group">
                                <label for="deliveryCompany" class="form-label" data-i18n="create.delivery">Delivery
                                    Company <span style="color: var(--danger-color);">*</span></label>
                                <select id="deliveryCompany" name="deliveryCompany" class="form-select" required>
                                    <option value="" data-i18n="create.selectDel">Select a delivery company</option>
                                    <option value="Express Livraison">Express Livraison</option>
                                    <option value="Rapid Delivery">Rapid Delivery</option>
                                    <option value="Alger Post">Alger Post</option>
                                    <option value="Nord Express">Nord Express</option>
                                    <option value="Sahara Logistique">Sahara Logistique</option>
                                </select>
                                <span class="form-hint" id="recommendedHint" data-i18n="create.recommendedCompany"
                                    style="display:none;">Recommended based on your profile</span>
                                <span class="form-error" id="deliveryCompanyError"></span>
                            </div>

                            <div class="form-group">
                                <label for="wilaya" class="form-label" data-i18n="create.wilaya">Wilaya <span
                                        style="color: var(--danger-color);">*</span></label>
                                <select id="wilaya" name="wilaya" class="form-select" required>
                                    <option value="" data-i18n="create.selectWilaya">Select Wilaya</option>
                                    <option value="Algiers">Algiers</option>
                                    <option value="Oran">Oran</option>
                                    <option value="Constantine">Constantine</option>
                                    <option value="Annaba">Annaba</option>
                                    <option value="Blida">Blida</option>
                                    <option value="Setif">Setif</option>
                                    <option value="Tlemcen">Tlemcen</option>
                                    <option value="Bejaia">Bejaia</option>
                                    <option value="Batna">Batna</option>
                                    <option value="Djelfa">Djelfa</option>
                                </select>
                                <span class="form-error" id="wilayaError"></span>
                            </div>

                            <div class="form-group">
                                <label for="customerPhone" class="form-label" data-i18n="create.phone">Customer Phone
                                    Number <span style="color: var(--danger-color);">*</span></label>
                                <input type="tel" id="customerPhone" name="customerPhone" class="form-input"
                                    placeholder="e.g., 0555123456" data-i18n-placeholder="ph.customerPhone" required>
                                <span class="form-error" id="customerPhoneError"></span>
                            </div>

                            <div class="form-group">
                                <label for="deliveryType" class="form-label" data-i18n="create.deliveryType">Delivery
                                    Type <span style="color: var(--danger-color);">*</span></label>
                                <select id="deliveryType" name="deliveryType" class="form-select" required>
                                    <option value="">Select delivery type</option>
                                    <option value="domicile">Domicile</option>
                                    <option value="bureau">Bureau</option>
                                </select>
                                <span class="form-error" id="deliveryTypeError"></span>
                            </div>

                            <div class="form-group">
                                <label for="weight" class="form-label" data-i18n="create.weight">Weight (kg) <span
                                        style="color: var(--danger-color);">*</span></label>
                                <input type="number" id="weight" name="weight" class="form-input"
                                    placeholder="e.g., 2.5" data-i18n-placeholder="ph.weight" step="0.1" min="0.1"
                                    required>
                                <span class="form-error" id="weightError"></span>
                            </div>

                            <div class="form-group">
                                <label for="notes" class="form-label" data-i18n="create.notes">Notes (Optional)</label>
                                <textarea id="notes" name="notes" class="form-textarea"
                                    placeholder="Additional instructions or notes about the delivery..."
                                    data-i18n-placeholder="ph.notes"></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary" data-i18n="create.submit">Submit
                                    Order</button>
                                <a href="#" id="cancelLink" class="btn btn-secondary"
                                    data-i18n="create.cancel">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Right: SVG Illustration -->
                <div class="create-order-illustration">
                    <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" class="illustration-svg"
                        aria-hidden="true">
                        <!-- Background circle -->
                        <circle cx="200" cy="200" r="180" fill="var(--primary-color)" opacity="0.06" />
                        <circle cx="200" cy="200" r="140" fill="var(--primary-color)" opacity="0.04" />

                        <!-- Delivery truck body -->
                        <rect x="80" y="180" width="160" height="90" rx="8" fill="var(--primary-color)"
                            opacity="0.85" />
                        <rect x="240" y="210" width="80" height="60" rx="8" fill="var(--primary-color)" opacity="0.7" />

                        <!-- Truck cabin window -->
                        <rect x="252" y="220" width="55" height="30" rx="4" fill="var(--surface)" opacity="0.9" />

                        <!-- Wheels -->
                        <circle cx="140" cy="275" r="22" fill="var(--text-primary)" opacity="0.8" />
                        <circle cx="140" cy="275" r="12" fill="var(--surface)" />
                        <circle cx="140" cy="275" r="5" fill="var(--text-secondary)" />
                        <circle cx="280" cy="275" r="22" fill="var(--text-primary)" opacity="0.8" />
                        <circle cx="280" cy="275" r="12" fill="var(--surface)" />
                        <circle cx="280" cy="275" r="5" fill="var(--text-secondary)" />

                        <!-- Package boxes on truck -->
                        <rect x="100" y="155" width="45" height="35" rx="4" fill="var(--warning-color)"
                            opacity="0.85" />
                        <rect x="155" y="145" width="40" height="45" rx="4" fill="var(--success-color)"
                            opacity="0.75" />
                        <rect x="200" y="160" width="30" height="30" rx="4" fill="var(--primary-light)" opacity="0.8" />

                        <!-- Package tape lines -->
                        <line x1="123" y1="155" x2="123" y2="190" stroke="var(--warning-color)" stroke-width="2"
                            opacity="0.5" />
                        <line x1="175" y1="145" x2="175" y2="190" stroke="var(--success-color)" stroke-width="2"
                            opacity="0.4" />

                        <!-- Road -->
                        <rect x="40" y="295" width="320" height="4" rx="2" fill="var(--border-color)" />
                        <rect x="60" y="308" width="30" height="3" rx="1.5" fill="var(--border-color)" opacity="0.5" />
                        <rect x="120" y="308" width="50" height="3" rx="1.5" fill="var(--border-color)" opacity="0.5" />
                        <rect x="200" y="308" width="40" height="3" rx="1.5" fill="var(--border-color)" opacity="0.5" />
                        <rect x="270" y="308" width="60" height="3" rx="1.5" fill="var(--border-color)" opacity="0.5" />

                        <!-- Location pin -->
                        <g transform="translate(300, 90)">
                            <path d="M20 0C9 0 0 9 0 20c0 15 20 35 20 35s20-20 20-35C40 9 31 0 20 0z"
                                fill="var(--danger-color)" opacity="0.85" />
                            <circle cx="20" cy="18" r="8" fill="white" opacity="0.9" />
                        </g>

                        <!-- Motion lines -->
                        <rect x="50" y="230" width="20" height="2.5" rx="1.25" fill="var(--primary-color)"
                            opacity="0.3" />
                        <rect x="55" y="245" width="15" height="2.5" rx="1.25" fill="var(--primary-color)"
                            opacity="0.2" />
                        <rect x="45" y="260" width="25" height="2.5" rx="1.25" fill="var(--primary-color)"
                            opacity="0.25" />

                        <!-- Floating checkmark -->
                        <g transform="translate(90, 95)">
                            <circle cx="20" cy="20" r="20" fill="var(--success-color)" opacity="0.15" />
                            <circle cx="20" cy="20" r="14" fill="var(--success-color)" opacity="0.85" />
                            <path d="M13 20l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round" fill="none" />
                        </g>
                    </svg>
                    <p class="illustration-caption" data-i18n="create.illustCaption">Fast &amp; reliable delivery
                        management</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase/supabaseClient.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/orders.js"></script>
    <script src="../js/i18n.js"></script>
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', function () {
            // Check role-based access - only merchants can create orders
            if (!auth.checkPageAccess('merchant')) {
                return;
            }

            // Initialize navigation (also sets Cancel link to dashboard)
            auth.initNavigation();
            var cancelLink = document.getElementById('cancelLink');
            if (cancelLink) cancelLink.href = 'merchant-dashboard.html';

            // Initialize theme & language
            platformUI.init();

            // Render smart back button
            platformUI.renderBackButton('.page-content');

            // Auto-select preferred delivery company from merchant profile
            var currentUser = auth.getCurrentUser();
            var deliverySelect = document.getElementById('deliveryCompany');
            var recommendedHint = document.getElementById('recommendedHint');
            if (currentUser && currentUser.preferredDelivery && deliverySelect) {
                // Only set if the value exists among the options
                var optionExists = Array.prototype.slice.call(deliverySelect.options).some(function (opt) {
                    return opt.value === currentUser.preferredDelivery;
                });
                if (optionExists) {
                    deliverySelect.value = currentUser.preferredDelivery;
                    if (recommendedHint) recommendedHint.style.display = '';
                }
            }

            // Form validation
            const form = document.getElementById('createOrderForm');
            const productName = document.getElementById('productName');
            const wilaya = document.getElementById('wilaya');
            const weight = document.getElementById('weight');

            var customerPhone = document.getElementById('customerPhone');
            var deliveryTypeSelect = document.getElementById('deliveryType');
            var firstNameInput = document.getElementById('firstName');
            var lastNameInput = document.getElementById('lastName');
            var customerAddressInput = document.getElementById('customerAddress');

            // Delivery type change validation
            deliveryTypeSelect.addEventListener('change', function () {
                if (this.value) {
                    document.getElementById('deliveryTypeError').textContent = '';
                }
            });

            // Real-time validation for firstName
            firstNameInput.addEventListener('blur', function () {
                var val = this.value.trim();
                if (!val) {
                    document.getElementById('firstNameError').textContent = 'Customer first name is required';
                } else if (val.length < 2) {
                    document.getElementById('firstNameError').textContent = 'First name must be at least 2 characters';
                } else {
                    document.getElementById('firstNameError').textContent = '';
                }
            });

            // Real-time validation for lastName
            lastNameInput.addEventListener('blur', function () {
                var val = this.value.trim();
                if (!val) {
                    document.getElementById('lastNameError').textContent = 'Customer last name is required';
                } else if (val.length < 2) {
                    document.getElementById('lastNameError').textContent = 'Last name must be at least 2 characters';
                } else {
                    document.getElementById('lastNameError').textContent = '';
                }
            });

            // Real-time validation for customerAddress
            customerAddressInput.addEventListener('blur', function () {
                var val = this.value.trim();
                if (!val) {
                    document.getElementById('customerAddressError').textContent = 'Customer address is required';
                } else if (val.length < 5) {
                    document.getElementById('customerAddressError').textContent = 'Address must be at least 5 characters';
                } else {
                    document.getElementById('customerAddressError').textContent = '';
                }
            });

            // Real-time validation
            customerPhone.addEventListener('blur', function () {
                var val = this.value.trim();
                if (!val) {
                    document.getElementById('customerPhoneError').textContent = 'Customer phone number is required';
                } else if (!/^\d+$/.test(val)) {
                    document.getElementById('customerPhoneError').textContent = 'Phone number must contain only digits';
                } else {
                    document.getElementById('customerPhoneError').textContent = '';
                }
            });

            productName.addEventListener('blur', function () {
                if (this.value.trim().length < 2) {
                    document.getElementById('productNameError').textContent = 'Product name must be at least 2 characters';
                } else {
                    document.getElementById('productNameError').textContent = '';
                }
            });



            document.getElementById('deliveryCompany').addEventListener('change', function () {
                if (!this.value) {
                    document.getElementById('deliveryCompanyError').textContent = 'Please select a delivery company';
                } else {
                    document.getElementById('deliveryCompanyError').textContent = '';
                }
            });

            wilaya.addEventListener('change', function () {
                if (!this.value) {
                    document.getElementById('wilayaError').textContent = 'Please select a wilaya';
                } else {
                    document.getElementById('wilayaError').textContent = '';
                }
            });

            weight.addEventListener('blur', function () {
                const value = parseFloat(this.value);
                if (!value || value <= 0) {
                    document.getElementById('weightError').textContent = 'Please enter a valid weight (greater than 0)';
                } else {
                    document.getElementById('weightError').textContent = '';
                }
            });

            // Handle form submission
            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                // Clear previous errors
                document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

                // Validate
                let isValid = true;
                const deliveryCompany = document.getElementById('deliveryCompany');

                // Validate firstName
                var fnVal = firstNameInput.value.trim();
                if (!fnVal || fnVal.length < 2) {
                    document.getElementById('firstNameError').textContent = 'Customer first name is required (min 2 characters)';
                    isValid = false;
                }

                // Validate lastName
                var lnVal = lastNameInput.value.trim();
                if (!lnVal || lnVal.length < 2) {
                    document.getElementById('lastNameError').textContent = 'Customer last name is required (min 2 characters)';
                    isValid = false;
                }

                // Validate customerAddress
                var addrVal = customerAddressInput.value.trim();
                if (!addrVal || addrVal.length < 5) {
                    document.getElementById('customerAddressError').textContent = 'Customer address is required (min 5 characters)';
                    isValid = false;
                }

                if (!deliveryCompany.value) {
                    document.getElementById('deliveryCompanyError').textContent = 'Please select a delivery company';
                    isValid = false;
                }

                if (productName.value.trim().length < 2) {
                    document.getElementById('productNameError').textContent = 'Product name must be at least 2 characters';
                    isValid = false;
                }



                if (!document.getElementById('deliveryCompany').value) {
                    document.getElementById('deliveryCompanyError').textContent = 'Please select a delivery company';
                    isValid = false;
                }

                if (!wilaya.value) {
                    document.getElementById('wilayaError').textContent = 'Please select a wilaya';
                    isValid = false;
                }

                if (!weight.value || parseFloat(weight.value) <= 0) {
                    document.getElementById('weightError').textContent = 'Please enter a valid weight (greater than 0)';
                    isValid = false;
                }

                var phoneVal = customerPhone.value.trim();
                if (!phoneVal) {
                    document.getElementById('customerPhoneError').textContent = 'Customer phone number is required';
                    isValid = false;
                } else if (!/^\d+$/.test(phoneVal)) {
                    document.getElementById('customerPhoneError').textContent = 'Phone number must contain only digits';
                    isValid = false;
                }

                if (!deliveryTypeSelect.value) {
                    document.getElementById('deliveryTypeError').textContent = 'Please select a delivery type';
                    isValid = false;
                }

                if (isValid) {
                    await orders.createOrder();
                }
            });
        });
    </script>
</body>

</html>
