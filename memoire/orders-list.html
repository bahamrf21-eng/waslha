<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders List - Waslha</title>
    <link rel="stylesheet" href="css/global.css">
</head>

<body>
    <!-- Navigation Bar (Merchant: Dashboard, Orders, Create Order, Profile, Logout) -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="#" class="navbar-brand" id="dashboardLink">Was<span>lha</span></a>
            <div class="navbar-links">
                <a href="#" class="navbar-link" id="ordersLink" data-i18n="nav.orders">Orders</a>
                <a href="#" class="navbar-link" id="createOrderLink" data-i18n="nav.createOrder">Create Order</a>
                <a href="profile.html" class="navbar-link" data-i18n="nav.profile">Profile</a>
                <button class="btn-link" onclick="auth.logout()" data-i18n="nav.logout">Logout</button>
                <div class="navbar-toggles">
                    <button class="toggle-btn theme-toggle" onclick="platformUI.toggleTheme()">🌙 Dark</button>
                    <button class="toggle-btn lang-toggle" onclick="platformUI.toggleLang()">AR عربي</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container">
        <div class="page-content">
            <div class="page-header">
                <div class="page-header-illustrated">
                    <div class="section-illustration">&#128203;</div>
                    <div>
                        <h1 class="page-title" data-i18n="ordersList.title">My Orders</h1>
                        <p class="page-subtitle" data-i18n="ordersList.subtitle">View and manage all your delivery
                            orders</p>
                    </div>
                </div>
            </div>

            <!-- Phone Search -->
            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="card-header">
                    <h2 class="card-title" data-i18n="ordersList.searchTitle">Search Orders by Phone</h2>
                </div>
                <div class="card-body" style="padding: 1rem 1.5rem;">
                    <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
                        <input type="text" id="merchantPhoneSearch" class="form-input"
                            placeholder="Enter customer phone number" data-i18n-placeholder="ph.merchantPhoneSearch"
                            style="flex: 1; min-width: 200px; max-width: 400px; margin: 0;">
                        <button type="button" id="merchantPhoneSearchBtn" class="btn btn-primary"
                            data-i18n="ordersList.searchBtn">Search</button>
                    </div>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th data-i18n="ordersList.id">Order ID</th>
                            <th data-i18n="ordersList.customer">Customer</th>
                            <th data-i18n="ordersList.product">Product</th>
                            <th data-i18n="ordersList.wilaya">Wilaya</th>
                            <th data-i18n="ordersList.weight">Weight (kg)</th>
                            <th data-i18n="ordersList.deliveryType">Delivery Type</th>
                            <th data-i18n="ordersList.status">Status</th>
                            <th data-i18n="ordersList.actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 2rem;">
                                Loading orders...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase/supabaseClient.js"></script>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/i18n.js"></script>
    <script>
        // Load orders when page loads
        document.addEventListener('DOMContentLoaded', async function () {
            const currentUser = auth.getCurrentUser();

            if (!currentUser) {
                window.location.replace('login.html');
                return;
            }

            // Restrict access: only merchants should see orders list
            if (currentUser.role === 'delivery') {
                window.location.href = 'delivery-dashboard.html';
                return;
            }

            // Initialize navigation
            auth.initNavigation();

            // Initialize theme & language
            platformUI.init();

            // Render smart back button
            platformUI.renderBackButton('.page-content');

            // Load orders
            await orders.loadOrdersList();

            // Real-time phone search
            var phoneSearchInput = document.getElementById('merchantPhoneSearch');
            var phoneSearchBtn = document.getElementById('merchantPhoneSearchBtn');
            if (phoneSearchInput) {
                phoneSearchInput.addEventListener('input', async function () {
                    await orders.loadOrdersList(this.value.trim());
                });
                if (phoneSearchBtn) {
                    phoneSearchBtn.addEventListener('click', async function () {
                        await orders.loadOrdersList(phoneSearchInput.value.trim());
                    });
                }
            }
        });
    </script>
</body>

</html>
